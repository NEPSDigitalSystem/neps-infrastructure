version: '3.8'

services:
  # ─── Frontend ───
  neps-portal:
    build:
      context: ../neps-portal
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - AUTH_SECRET_FILE=/run/secrets/app_secret_key
      - NEXTAUTH_URL=http://localhost:3000
    volumes:
      - ../neps-portal:/app
      - /app/node_modules
      - /app/.next
    secrets:
      - app_secret_key
    networks:
      - neps-internal
    depends_on:
      - neps-backend
    security_opt:
      - no-new-privileges:true

  # ─── Backend ───
  neps-backend:
    image: python:3.11-slim
    command: python -m http.server 8000
    # build:
    #   context: ../neps-backend
    #   dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL_FILE=/run/secrets/postgres_password # Assuming app has logic to read from file
      - REDCAP_API_URL=${REDCAP_API_URL:-http://localhost:8001}
      - REDCAP_API_TOKEN_FILE=/run/secrets/redcap_api_token
    secrets:
      - redcap_api_token
      - postgres_password
      - postgres_user
    depends_on:
      - postgres
      - redis
    networks:
      - neps-internal
      - neps-database
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000')"]
      interval: 10s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true

  # ─── ML/AI ───
  neps-ml-ai:
    image: python:3.11-slim
    command: python -m http.server 8000
    # build:
    #   context: ../neps-ml-ai
    #   dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL_FILE=/run/secrets/postgres_password
    secrets:
      - postgres_password
    depends_on:
      - postgres
    networks:
      - neps-internal
      - neps-database
    security_opt:
      - no-new-privileges:true

  # ─── Data Platform ───
  neps-data-platform:
    image: python:3.11-slim
    command: python -m http.server 8000
    # build:
    #   context: ../neps-data-platform
    #   dockerfile: Dockerfile
    environment:
      - DATABASE_URL_FILE=/run/secrets/postgres_password
    secrets:
      - postgres_password
    depends_on:
      - postgres
    networks:
      - neps-internal
      - neps-database
    security_opt:
      - no-new-privileges:true

  # ─── Shared Services ───
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: neps_db
      POSTGRES_INITDB_ARGS: "--wal-level=replica --archive-mode=on"
    secrets:
      - postgres_user
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/pitr-setup.sh:/docker-entrypoint-initdb.d/pitr-setup.sh:ro
      - ./backups/pitr:/backup/pitr
      - ./scripts:/backup/scripts:ro
    command: ["postgres", "-c", "config_file=/var/lib/postgresql/data/postgresql.conf", "-c", "include_if_exists=/etc/postgresql/postgresql.conf.d/pitr.conf"]
    ports:
      - "5432:5432"
    networks:
      - neps-database
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    networks:
      - neps-internal
    security_opt:
      - no-new-privileges:true

  # ─── Monitoring Stack ───
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/rules:/etc/prometheus/rules
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - neps-internal
    depends_on:
      - neps-backend
      - postgres-exporter
      - node-exporter
      - alertmanager
    security_opt:
      - no-new-privileges:true

  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - neps-internal
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - neps-internal
    depends_on:
      - prometheus
      - loki
    security_opt:
      - no-new-privileges:true

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - neps-internal
    security_opt:
      - no-new-privileges:true

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - neps-internal
    security_opt:
      - no-new-privileges:true

  postgres-exporter:
    image: wrouesnel/postgres_exporter
    environment:
      DATA_SOURCE_FILE: /run/secrets/postgres_password
      DATA_SOURCE_USER_FILE: /run/secrets/postgres_user
      DATA_SOURCE_URI: postgres:5432/neps_db?sslmode=disable
    secrets:
      - postgres_user
      - postgres_password
    networks:
      - neps-database
      - neps-internal
    depends_on:
      - postgres
    security_opt:
      - no-new-privileges:true

  node-exporter:
    image: prom/node-exporter:latest
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - neps-internal
    security_opt:
      - no-new-privileges:true

  # ─── Reverse Proxy ───
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - neps-portal
      - neps-backend
      - neps-ml-ai
      - neps-data-platform
    networks:
      - neps-public
      - neps-internal
    security_opt:
      - no-new-privileges:true

  # ─── Resilience & Backups ───
  ofelia:
    image: mcuadros/ofelia:latest
    depends_on:
      - postgres
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/ofelia/config.ini:/etc/ofelia/config.ini:ro
    command: daemon --config /etc/ofelia/config.ini
    networks:
      - neps-internal
    security_opt:
      - no-new-privileges:true

  minio:
    image: minio/minio:latest
    ports:
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/app_secret_key
    secrets:
      - app_secret_key
    volumes:
      - ./backups/minio:/data
    command: server /data --console-address ":9001"
    networks:
      - neps-internal
    security_opt:
      - no-new-privileges:true

networks:
  neps-public:
    driver: bridge
  neps-internal:
    driver: bridge
    internal: true
  neps-database:
    driver: bridge
    internal: true

volumes:
  postgres-data:
  grafana-data:
  prometheus-data:

secrets:
  postgres_user:
    file: ./secrets/postgres_user.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  app_secret_key:
    file: ./secrets/app_secret_key.txt
  redcap_api_token:
    file: ./secrets/redcap_api_token.txt

version: '3.8'

services:
  # ─── Frontend ───
  neps-portal:
    image: nginx:alpine
    # build:
    #   context: ../neps-portal
    #   dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=development
    networks:
      - neps-network
    depends_on:
      - neps-backend

  # ─── Backend ───
  neps-backend:
    image: python:3.11-slim
    command: python -m http.server 8000
    # build:
    #   context: ../neps-backend
    #   dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://neps:neps_password@postgres:5432/neps_db
      - REDCAP_API_URL=${REDCAP_API_URL:-http://localhost:8001}
      - REDCAP_API_TOKEN=${REDCAP_API_TOKEN:-}
    depends_on:
      - postgres
      - redis
    networks:
      - neps-network

  # ─── ML/AI ───
  neps-ml-ai:
    image: python:3.11-slim
    command: python -m http.server 8000
    # build:
    #   context: ../neps-ml-ai
    #   dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://neps:neps_password@postgres:5432/neps_db
    depends_on:
      - postgres
    networks:
      - neps-network

  # ─── Data Platform ───
  neps-data-platform:
    image: python:3.11-slim
    command: python -m http.server 8000
    # build:
    #   context: ../neps-data-platform
    #   dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://neps:neps_password@postgres:5432/neps_db
    depends_on:
      - postgres
    networks:
      - neps-network

  # ─── Shared Services ───
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: neps
      POSTGRES_PASSWORD: neps_password
      POSTGRES_DB: neps_db
      # PITR Configuration
      POSTGRES_INITDB_ARGS: "--wal-level=replica --archive-mode=on"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/pitr-setup.sh:/docker-entrypoint-initdb.d/pitr-setup.sh
    ports:
      - "5432:5432"
    networks:
      - neps-network

  redis:
    image: redis:7-alpine
    networks:
      - neps-network

  # ─── Monitoring Stack ───
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/rules:/etc/prometheus/rules
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - neps-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - neps-network

  # ─── Reverse Proxy ───
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - neps-portal
      - neps-backend
      - neps-ml-ai
      - neps-data-platform
    networks:
      - neps-network

networks:
  neps-network:
    driver: bridge

volumes:
  postgres-data:
  grafana-data:
  prometheus-data:

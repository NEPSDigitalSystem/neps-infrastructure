version: '3.8'

services:
  # ─── Frontend ───
  neps-portal:
    build:
      context: ../neps-portal
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - AUTH_SECRET=neps-dev-secret-change-in-production-32chars-min
      - NEXTAUTH_URL=http://localhost:3000
    volumes:
      - ../neps-portal:/app
      - /app/node_modules
      - /app/.next
    networks:
      - neps-network
    depends_on:
      - neps-backend

  # ─── Backend ───
  neps-backend:
    image: python:3.11-slim
    command: python -m http.server 8000
    # build:
    #   context: ../neps-backend
    #   dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://neps:neps_password@postgres:5432/neps_db
      - REDCAP_API_URL=${REDCAP_API_URL:-http://localhost:8001}
      - REDCAP_API_TOKEN=${REDCAP_API_TOKEN:-}
    depends_on:
      - postgres
      - redis
    networks:
      - neps-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── ML/AI ───
  neps-ml-ai:
    image: python:3.11-slim
    command: python -m http.server 8000
    # build:
    #   context: ../neps-ml-ai
    #   dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://neps:neps_password@postgres:5432/neps_db
    depends_on:
      - postgres
    networks:
      - neps-network

  # ─── Data Platform ───
  neps-data-platform:
    image: python:3.11-slim
    command: python -m http.server 8000
    # build:
    #   context: ../neps-data-platform
    #   dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://neps:neps_password@postgres:5432/neps_db
    depends_on:
      - postgres
    networks:
      - neps-network

  # ─── Shared Services ───
  # One-shot: fix ownership of the WAL + base archive volumes (root-owned on
  # first create) so the postgres user (uid 70) can write archived segments
  # and base backups.
  postgres-init:
    image: postgres:15-alpine
    user: root
    command: chown -R 70:70 /backup/pitr/wal /backup/pitr/base
    volumes:
      - wal-archive:/backup/pitr/wal
      - base-archive:/backup/pitr/base
    networks:
      - neps-network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: neps
      POSTGRES_PASSWORD: neps_password
      POSTGRES_DB: neps_db
    # PITR / WAL archiving — passed directly to the server, not via initdb
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - archive_mode=on
      - -c
      - "archive_command=test ! -f /backup/pitr/wal/%f && cp %p /backup/pitr/wal/%f"
      - -c
      - archive_timeout=60
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - wal-archive:/backup/pitr/wal
      - base-archive:/backup/pitr/base
    ports:
      - "5432:5432"
    networks:
      - neps-network

  redis:
    image: redis:7-alpine
    networks:
      - neps-network

  # ─── Monitoring Stack ───
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/rules:/etc/prometheus/rules
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - neps-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana-datasources:/etc/grafana/provisioning/datasources
    networks:
      - neps-network

  # ─── Alerting ───
  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - neps-network

  # Tiny sink so a fired alert is visibly received with nothing external.
  # `docker compose logs webhook-logger` will show the alert JSON payload.
  webhook-logger:
    image: mendhak/http-https-echo:31
    ports:
      - "8085:8080"          # optional: lets you curl it directly for testing
    networks:
      - neps-network

  # ─── Logs ───
  loki:
    image: grafana/loki:2.9.8
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - neps-network

  promtail:
    image: grafana/promtail:2.9.8
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro   # Docker SD log discovery
      - promtail-data:/var/lib/promtail                 # positions file persists here
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - neps-network

  # ─── Reverse Proxy ───
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - neps-portal
      - neps-backend
      - neps-ml-ai
      - neps-data-platform
    networks:
      - neps-network

networks:
  neps-network:
    driver: bridge

volumes:
  postgres-data:
  wal-archive:
  base-archive:
  grafana-data:
  prometheus-data:
  alertmanager-data:
  loki-data:
  promtail-data:

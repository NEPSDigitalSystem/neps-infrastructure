version: '3.8'

# This overlay is used by scripts/rollback.sh to force the environment back to 
# known stable image tags or to override health checks during recovery.

services:
  neps-portal:
    image: ${STABLE_PORTAL_IMAGE:-ghcr.io/nepsdigitalsystem/neps-portal:latest}
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first

  neps-backend:
    image: ${STABLE_BACKEND_IMAGE:-ghcr.io/nepsdigitalsystem/neps-backend:latest}
    healthcheck:
      # Loosen health check for faster recovery switch
      interval: 5s
      retries: 5

  neps-ml-ai:
    image: ${STABLE_ML_IMAGE:-ghcr.io/nepsdigitalsystem/neps-ml-ai:latest}

  neps-data-platform:
    image: ${STABLE_DATA_IMAGE:-ghcr.io/nepsdigitalsystem/neps-data-platform:latest}

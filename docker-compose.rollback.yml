# ─────────────────────────────────────────────────────────────────────────────
# NEPS Digital — Rollback overlay  (docker-compose.rollback.yml)
#
# Pins all four app services to a specific GHCR image version.
#
# Usage (see scripts/rollback.sh):
#   export IMAGE_TAG=<target-sha>
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#                  -f docker-compose.rollback.yml up -d
#
# On production/staging servers always include docker-compose.prod.yml so the
# base stack is not building from local source or running HTTP stubs.
# ─────────────────────────────────────────────────────────────────────────────

services:
  neps-portal:
    image: ghcr.io/nepsdigitalsystem/neps-portal:${IMAGE_TAG:?IMAGE_TAG must be set (target image tag, e.g. a git SHA)}
    build: !reset null
    # Replace dev bind-mounts so the rolled-back image's /app is used.
    volumes: !override []

  neps-backend:
    image: ghcr.io/nepsdigitalsystem/neps-backend:${IMAGE_TAG:?IMAGE_TAG must be set (target image tag, e.g. a git SHA)}
    build: !reset null
    command: !reset null

  neps-ml-ai:
    image: ghcr.io/nepsdigitalsystem/neps-ml-ai:${IMAGE_TAG:?IMAGE_TAG must be set (target image tag, e.g. a git SHA)}
    command: !reset null

  neps-data-platform:
    image: ghcr.io/nepsdigitalsystem/neps-data-platform:${IMAGE_TAG:?IMAGE_TAG must be set (target image tag, e.g. a git SHA)}
    command: !reset null

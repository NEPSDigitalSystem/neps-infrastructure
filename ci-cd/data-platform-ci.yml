# neps-data-platform/.github/workflows/ci-cd.yml
name: NEPS Data Platform CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

env:
  IMAGE: ghcr.io/nepsdigitalsystem/neps-data-platform

jobs:
  check-structure:
    runs-on: ubuntu-latest
    outputs:
      SKIP_BUILD: ${{ steps.check.outputs.SKIP_BUILD }}
      SKIP_TEST: ${{ steps.check.outputs.SKIP_TEST }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for application files
        id: check
        run: |
          HAS_DEPS="false"
          if [ -f "requirements.txt" ] || [ -f "package.json" ]; then
            HAS_DEPS="true"
          fi
          if [ ! -f "Dockerfile" ] || [ "$HAS_DEPS" = "false" ]; then
            echo "SKIP_BUILD=true" >> $GITHUB_OUTPUT
          else
            echo "SKIP_BUILD=false" >> $GITHUB_OUTPUT
          fi
          if [ "$HAS_DEPS" = "false" ]; then
            echo "SKIP_TEST=true" >> $GITHUB_OUTPUT
          else
            echo "SKIP_TEST=false" >> $GITHUB_OUTPUT
          fi

  test:
    needs: check-structure
    if: needs.check-structure.outputs.SKIP_TEST != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests
        run: pytest tests/ || echo "No tests yet"

  build:
    needs: [check-structure, test]
    if: always() && needs.check-structure.outputs.SKIP_BUILD != 'true' && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  deploy:
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_HOST != ''
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/neps-infrastructure
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull neps-data-platform
            docker compose up -d --no-deps neps-data-platform
            docker image prune -f
            echo "Deployed neps-data-platform:${{ github.sha }} at $(date)"

jobs:
  check-structure:
    runs-on: ubuntu-latest
    outputs:
      SKIP_BUILD: ${{ steps.check.outputs.SKIP_BUILD }}
      SKIP_TEST: ${{ steps.check.outputs.SKIP_TEST }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for application files
        id: check
        run: |
          # Define dependency existence
          HAS_DEPS="false"
          if [ -f "requirements.txt" ] || [ -f "package.json" ]; then
            HAS_DEPS="true"
          fi

          if [ ! -f "Dockerfile" ]; then
            echo "::warning::No Dockerfile found. Skipping build."
            echo "SKIP_BUILD=true" >> $GITHUB_OUTPUT
          elif [ "$HAS_DEPS" = "false" ]; then
            echo "::warning::Dockerfile exists but no dependency file (package.json/requirements.txt) found. Skipping build to prevent failure."
            echo "SKIP_BUILD=true" >> $GITHUB_OUTPUT
          else
            echo "SKIP_BUILD=false" >> $GITHUB_OUTPUT
          fi

          if [ "$HAS_DEPS" = "false" ]; then
            echo "::warning::No dependency file found. Skipping tests."
            echo "SKIP_TEST=true" >> $GITHUB_OUTPUT
          else
            echo "SKIP_TEST=false" >> $GITHUB_OUTPUT
          fi

  test:
    needs: check-structure
    if: needs.check-structure.outputs.SKIP_TEST != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        if: hashFiles('requirements.txt') != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Set up Node
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Python deps
        if: hashFiles('requirements.txt') != ''
        run: pip install -r requirements.txt
      
      - name: Install Node deps
        if: hashFiles('package.json') != ''
        run: npm ci
      
      - name: Run tests
        run: |
          if [ -f "requirements.txt" ]; then
            pytest || echo "No tests yet"
          elif [ -f "package.json" ]; then
            npm test || echo "No tests yet"
          else
            echo "No tests yet"
          fi

  build:
    needs: [check-structure, test]
    if: always() && needs.check-structure.outputs.SKIP_BUILD != 'true' && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/nepsdigitalsystem/${{ github.event.repository.name }}:${{ github.sha }}
            ghcr.io/nepsdigitalsystem/${{ github.event.repository.name }}:latest

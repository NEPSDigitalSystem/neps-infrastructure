# neps-backend/.github/workflows/ci-cd.yml
name: NEPS Backend CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

env:
  IMAGE: ghcr.io/nepsdigitalsystem/neps-backend

jobs:
  check-structure:
    runs-on: ubuntu-latest
    outputs:
      SKIP_BUILD: ${{ steps.check.outputs.SKIP_BUILD }}
      SKIP_TEST: ${{ steps.check.outputs.SKIP_TEST }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for application files
        id: check
        run: |
          HAS_DEPS="false"
          if [ -f "requirements.txt" ] || [ -f "package.json" ]; then
            HAS_DEPS="true"
          fi
          if [ ! -f "Dockerfile" ] || [ "$HAS_DEPS" = "false" ]; then
            echo "SKIP_BUILD=true" >> $GITHUB_OUTPUT
          else
            echo "SKIP_BUILD=false" >> $GITHUB_OUTPUT
          fi
          if [ "$HAS_DEPS" = "false" ]; then
            echo "SKIP_TEST=true" >> $GITHUB_OUTPUT
          else
            echo "SKIP_TEST=false" >> $GITHUB_OUTPUT
          fi

  test:
    needs: check-structure
    if: needs.check-structure.outputs.SKIP_TEST != 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: neps
          POSTGRES_PASSWORD: neps_password
          POSTGRES_DB: neps_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests
        env:
          DATABASE_URL: postgresql://neps:neps_password@localhost:5432/neps_db
        run: pytest --cov=app tests/ || echo "No tests yet"

  build:
    needs: [check-structure, test]
    if: always() && needs.check-structure.outputs.SKIP_BUILD != 'true' && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  deploy:
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_HOST != ''
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/neps-infrastructure
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull neps-backend
            docker compose up -d --no-deps neps-backend
            docker image prune -f
            echo "Deployed neps-backend:${{ github.sha }} at $(date)"

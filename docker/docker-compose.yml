version: '3.8'

services:
  # ─── Frontend ───────────────────────────────────────────────────────────────
  neps-portal:
    build:
      context: ../../neps-portal
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_AI_URL=http://localhost:8001
    depends_on:
      - neps-backend
    networks:
      - neps-network
    restart: unless-stopped
    labels:
      - "com.neps.service=portal"
      - "com.neps.team=frontend"

  # ─── Backend (FastAPI) ──────────────────────────────────────────────────────
  neps-backend:
    build:
      context: ../../neps-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=${APP_NAME:-NEPS Digital Backend}
      - APP_ENV=${APP_ENV:-development}
      - DEBUG=${DEBUG:-true}
      - DATABASE_USER=${POSTGRES_USER:-neps}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-neps_password}
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=${POSTGRES_DB:-neps_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - REDCAP_API_URL=${REDCAP_API_URL:-http://neps-backend:8000/api/redcap}
      - REDCAP_API_TOKEN=${REDCAP_API_TOKEN}
      - REDCAP_MOCK_ENABLED=${REDCAP_MOCK_ENABLED:-true}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - neps-network
    restart: unless-stopped
    labels:
      - "com.neps.service=backend"
      - "com.neps.team=backend"

  # ─── AI / ML Analytics ─────────────────────────────────────────────────────
  neps-ml-ai:
    build:
      context: ../../neps-ml-ai
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://neps:neps_password@postgres:5432/neps_db
      - REDIS_URL=redis://redis:6379/1
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - neps-network
    restart: unless-stopped
    labels:
      - "com.neps.service=ai-analytics"
      - "com.neps.team=ai"

  # ─── Data Platform ──────────────────────────────────────────────────────────
  neps-data-platform:
    build:
      context: ../../neps-data-platform
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://neps:neps_password@postgres:5432/neps_db
      - REDIS_URL=redis://redis:6379/2
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - neps-network
    restart: unless-stopped
    labels:
      - "com.neps.service=data-platform"
      - "com.neps.team=data"

  # ─── Shared Services ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: neps
      POSTGRES_PASSWORD: neps_password
      POSTGRES_DB: neps_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - neps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neps -d neps_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - neps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ─── pgAdmin (Database Management UI) ────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@neps.org
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - neps-network
    restart: unless-stopped
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  # ─── Monitoring ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - neps-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - neps-network
    restart: unless-stopped

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  neps-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  pgadmin-data:
    driver: local

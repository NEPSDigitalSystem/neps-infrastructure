global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'neps-backend'
    static_configs:
      - targets: ['neps-backend:8000']
    metrics_path: '/metrics'

  - job_name: 'neps-ml-ai'
    static_configs:
      - targets: ['neps-ml-ai:8000']
    metrics_path: '/metrics'

  - job_name: 'neps-data-platform'
    static_configs:
      - targets: ['neps-data-platform:8000']
    metrics_path: '/metrics'

apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: "15s"

  - name: Loki
    uid: loki
    type: loki
    url: http://loki:3100
    access: proxy
    jsonData:
      maxLines: 1000

# Ofelia job scheduler — uses standard 5-field cron (minute hour day month weekday)
# Docs: https://github.com/mcuadros/ofelia

[job-exec "pitr-base-backup"]
# Run at 02:00 every night
schedule = 0 2 * * *
container = neps-infrastructure-postgres-1
command = /backup/scripts/backup-pitr.sh full

[job-exec "pitr-wal-cleanup"]
# Run at 03:00 every night — delete WAL files older than 7 days
schedule = 0 3 * * *
container = neps-infrastructure-postgres-1
command = find /backup/pitr/wal -type f -mtime +7 -delete

[job-exec "data-platform-etl"]
# Run at 01:00 every night to sync data from REDCap
schedule = 0 1 * * *
container = neps-infrastructure-neps-data-platform-1
command = sh -c "export DATABASE_URL=postgresql://neps:$$(cat /run/secrets/postgres_password)@postgres:5432/neps_db && python -m etl.main sync --full"

groups:
  - name: neps-critical
    rules:
      - alert: SafeguardingCrisisAlert
        expr: neps_safeguarding_alerts{severity="critical"} > 0
        for: 0s
        labels:
          severity: critical
          team: safeguarding
        annotations:
          summary: "🚨 CRISIS: Participant {{ $labels.participant_id }} requires immediate attention"
          description: "Alert type: {{ $labels.alert_type }} at {{ $labels.site }}"

      - alert: ServiceDown
        expr: up{job=~"neps-.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "NEPS service {{ $labels.job }} is DOWN"

      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is DOWN"

      - alert: REDCapSyncFailure
        expr: increase(neps_redcap_sync_errors_total[5m]) > 3
        for: 2m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "REDCap sync failing repeatedly"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }}"

      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Disk space critical on {{ $labels.instance }}"

      - alert: MemoryHigh
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage > 90% on {{ $labels.instance }}"

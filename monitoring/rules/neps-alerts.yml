# ═════════════════════════════════════════════════════════════════════════════
# NEPS Digital - Prometheus Alert Rules
# ═════════════════════════════════════════════════════════════════════════════

groups:
  - name: neps-critical
    rules:
      # ─── Service Availability ───
      - alert: ServiceDown
        expr: up{job=~"neps-.*|postgres|redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "NEPS service {{ $labels.job }} is DOWN"
          description: "Service has been down for more than 1 minute. Check container status."

      - alert: HighErrorRate
        expr: |
          (
            rate(http_requests_total{status=~"5.."}[5m])
            /
            rate(http_requests_total[5m])
          ) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate ({{ $value | humanizePercentage }}) on {{ $labels.job }}"

      # ─── Database ───
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is DOWN"

      - alert: PostgreSQLConnectionsHigh
        expr: |
          pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections high: {{ $value }}"

      # ─── Infrastructure ───
      - alert: DiskSpaceCritical
        expr: |
          (
            node_filesystem_avail_bytes
            /
            node_filesystem_size_bytes
          ) < 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Disk space critical on {{ $labels.instance }}"

      - alert: MemoryHigh
        expr: |
          (
            node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes
          )
          /
          node_memory_MemTotal_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage > 90% on {{ $labels.instance }}"

      - alert: CPUHigh
        expr: |
          100 - (
            avg by(instance) (
              irate(node_cpu_seconds_total{mode="idle"}[5m])
            ) * 100
          ) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CPU usage > 85% on {{ $labels.instance }}"

  # ─── Safeguarding Alerts ───
  - name: safeguarding
    rules:
      - alert: SafeguardingCrisisDetected
        expr: |
          (
            neps_monthly_reports{suicidality_screening=~"Active plan|Recent attempt"} == 1
            or
            neps_monthly_reports{anxiety_score=~"1[6-9]|2[0-9]"} == 1
            or
            neps_monthly_reports{depression_score=~"2[1-9]|3[0-9]"} == 1
          )
        for: 0s
        labels:
          severity: critical
          team: safeguarding
          priority: p0
        annotations:
          summary: "🚨 CRISIS: Participant {{ $labels.participant_id }} requires immediate attention"
          description: "Alert type: {{ $labels.alert_type }}. Site: {{ $labels.site }}. Country: {{ $labels.country }}"
          action: "Contact on-call psychologist immediately"

      - alert: SafeguardingDistressEscalation
        expr: rate(neps_distress_escalations_total[5m]) > 0
        for: 30s
        labels:
          severity: critical
          team: safeguarding
        annotations:
          summary: "Distress escalation detected in last 5 minutes"

  # ─── REDCap Integration ───
  - name: redcap
    rules:
      - alert: REDCapSyncFailure
        expr: increase(neps_redcap_sync_errors_total[5m]) > 3
        for: 2m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "REDCap sync failing repeatedly"

      - alert: REDCapSyncStale
        expr: time() - neps_redcap_last_sync_timestamp > 600
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "REDCap sync is stale (>10 min since last sync)"

  # ─── Data Pipeline ───
  - name: data-pipeline
    rules:
      - alert: ETLJobFailed
        expr: increase(neps_etl_jobs_failed_total[1h]) > 0
        for: 0m
        labels:
          severity: warning
          team: data
        annotations:
          summary: "ETL job failed in the last hour"

      - alert: DataQualityScoreLow
        expr: neps_data_quality_score < 0.95
        for: 15m
        labels:
          severity: warning
          team: data
        annotations:
          summary: "Data quality score dropped to {{ $value }}"

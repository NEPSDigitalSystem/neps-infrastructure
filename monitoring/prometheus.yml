global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'neps-digital'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'neps-backend'
    static_configs:
      - targets: ['neps-backend:8000']
    metrics_path: /metrics
    scrape_interval: 5s

  - job_name: 'neps-portal'
    static_configs:
      - targets: ['neps-portal:3000']
    metrics_path: /api/metrics

  - job_name: 'neps-ml-ai'
    static_configs:
      - targets: ['neps-ml-ai:8000']
    metrics_path: /metrics

  - job_name: 'neps-data-platform'
    static_configs:
      - targets: ['neps-data-platform:8000']
    metrics_path: /metrics

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

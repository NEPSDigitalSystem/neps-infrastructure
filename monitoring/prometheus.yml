global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'neps-digital'
    replica: '{{.ExternalURL}}'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # NEPS Services
  - job_name: 'neps-backend'
    static_configs:
      - targets: ['neps-backend:8000']
    metrics_path: /metrics
    scrape_interval: 5s
  
  - job_name: 'neps-portal'
    static_configs:
      - targets: ['neps-portal:3000']
    metrics_path: /api/metrics
  
  - job_name: 'neps-ml-ai'
    static_configs:
      - targets: ['neps-ml-ai:8000']
    metrics_path: /metrics
  
  - job_name: 'neps-data-platform'
    static_configs:
      - targets: ['neps-data-platform:8000']
    metrics_path: /metrics

  # Infrastructure
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
  
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
  
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
  
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Blackbox monitoring (external health checks)
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://neps-backend:8000/health
        - http://neps-portal:3000
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: __address__
        replacement: blackbox-exporter:9115

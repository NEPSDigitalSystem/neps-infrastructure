global:
  resolve_timeout: 5m

# Default: webhook-logger sink (visible via `docker compose logs webhook-logger`).
# Replace webhook_configs with Slack/email when credentials are available.
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'webhook-logger'

  routes:
    # Safeguarding alerts — notify immediately
    - matchers:
        - severity="critical"
        - team="safeguarding"
      group_wait: 0s
      receiver: 'webhook-logger'

    - matchers:
        - severity="critical"
      receiver: 'webhook-logger'

    - matchers:
        - severity="warning"
      receiver: 'webhook-logger'

receivers:
  - name: 'webhook-logger'
    webhook_configs:
      - url: 'http://webhook-logger:8080/'
        send_resolved: true

  # Uncomment when Slack webhook is provisioned:
  # - name: 'slack-alerts'
  #   slack_configs:
  #     - api_url: 'https://hooks.slack.com/services/T.../B.../xxx'
  #       channel: '#neps-alerts'
  #       send_resolved: true

inhibit_rules:
  - source_matchers: ['severity="critical"']
    target_matchers: ['severity="warning"']
    equal: ['alertname', 'job']

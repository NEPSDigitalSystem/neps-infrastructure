version: '3.8'

services:
  neps-backend:
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  neps-portal:
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m

  postgres:
    security_opt:
      - no-new-privileges:true
    environment:
      # Blank the base file's POSTGRES_PASSWORD so it doesn't collide with
      # POSTGRES_PASSWORD_FILE — postgres treats "both set" as a fatal error.
      # An explicit empty string reads as "unset" for the entrypoint's
      # exclusivity check; the secret file then becomes authoritative.
      POSTGRES_PASSWORD: ""
      # Never use default passwords in production
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password

secrets:
  db_password:
    file: ./secrets/postgres_password.txt
